services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: sunculture_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: sunculture_db
      CLICKHOUSE_USER: clickhouse_user
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "clickhouse_user",
          "--password",
          "clickhouse_password",
          "--query",
          "SELECT 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: db-init
    container_name: sunculture_db_init
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: clickhouse_user
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DB: sunculture_db
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: sunculture_api
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: clickhouse_user
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DB: sunculture_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SUNAI_PROVIDER: ${SUNAI_PROVIDER:-openai}
      SUNAI_MODEL: ${SUNAI_MODEL:-gpt-4o-mini}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./models:/app/models:ro
      - ./workspace:/app/workspace
      - ./data/processed:/app/data/processed
    depends_on:
      clickhouse:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: sunculture_ui
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  ch_data:
